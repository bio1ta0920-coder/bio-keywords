name: 분류 페이지 자동 동기화

on:
  schedule:
    # 매일 오전 9시 (KST) = UTC 00:00
    - cron: "0 0 * * *"
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write

jobs:
  sync-keywords:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Python 3.12 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 동기화 실행
        run: python sync_keywords.py

      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "분류 페이지 자동 동기화: $(TZ=Asia/Seoul date '+%Y-%m-%d')"
          git pull --rebase
          git push
